server:
  port: 8084

spring:
  application:
    name: integration-service

  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        register: true
        instance-id: ${spring.application.name}:${random.value}
        service-name: ${spring.application.name}
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        tags:
          - integration
          - gateway

  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:enterprise_db}?currentSchema=${DB_SCHEMA:integration_schema}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_SCHEMA:integration_schema}
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    create-schemas: true
    default-schema: ${DB_SCHEMA:integration_schema}
    schemas: ${DB_SCHEMA:integration_schema}

  # Cache Configuration (L1 + L2)
  cache:
    type: redis
    cache-names:
      - thirdPartyData
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s

  # Redis Configuration (L2)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 3
      timeout: 3000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.01}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    root: INFO
    com.enterprise: DEBUG

# Custom Integration Configuration
integration:
  providers:
    # Example Provider A (JWT Auth)
    provider-a:
      base-url: https://mock-api.com/v1
      auth:
        type: JWT
        token-url: https://mock-api.com/oauth/token
        client-id: ${PROVIDER_A_CLIENT_ID:app-client}
        client-secret: ${PROVIDER_A_CLIENT_SECRET}
      cache:
        ttl: 3600 # 1 hour

    # Example Provider B (Public Key / API Key)
    provider-b:
      base-url: https://partner-api.com/v2
      auth:
        type: API_KEY
        header-name: X-API-KEY
        value: ${PROVIDER_B_API_KEY}
