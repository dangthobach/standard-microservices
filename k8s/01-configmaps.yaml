apiVersion: v1
kind: ConfigMap
metadata:
  name: process-service-config
  namespace: product-mgmt-prod
data:
  application.yml: |
    spring:
      application:
        name: process-management-service
      profiles:
        active: prod
      datasource:
        url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA:flowable}
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        hikari:
          maximum-pool-size: 40
          minimum-idle: 10
      flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        create-schemas: true
        default-schema: ${DB_SCHEMA:flowable}
        schemas: ${DB_SCHEMA:flowable}
      rabbitmq:
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT}
        username: ${RABBITMQ_USER}
        password: ${RABBITMQ_PASSWORD}
    
    flowable:
      database-schema: ${DB_SCHEMA:flowable}
      database-schema-update: true
      async-executor-activate: true
      async-executor:
        core-pool-size: 10
        max-pool-size: 50
        queue-size: 500
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
    
    logging:
      level:
        root: INFO
        com.enterprise.process: INFO
        org.flowable: WARN
