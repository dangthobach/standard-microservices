apiVersion: v1
kind: ConfigMap
metadata:
  name: business-service-config
  namespace: product-mgmt-prod
data:
  application.yml: |
    spring:
      application:
        name: business-service
      profiles:
        active: prod
      datasource:
        url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA:business_schema}
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        hikari:
          maximum-pool-size: 50
          minimum-idle: 10
          connection-timeout: 20000
          idle-timeout: 300000
          max-lifetime: 1800000
      flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        create-schemas: true
        default-schema: ${DB_SCHEMA:business_schema}
        schemas: ${DB_SCHEMA:business_schema}
      jpa:
        hibernate:
          ddl-auto: validate
        properties:
          hibernate:
            default_schema: ${DB_SCHEMA:business_schema}
      rabbitmq:
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT}
        username: ${RABBITMQ_USER}
        password: ${RABBITMQ_PASSWORD}
      redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT}
        password: ${REDIS_PASSWORD}
        lettuce:
          pool:
            max-active: 20
            max-idle: 10
            min-idle: 5
      cache:
        type: redis
        redis:
          time-to-live: 300000
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
      metrics:
        export:
          prometheus:
            enabled: true
    
    logging:
      level:
        root: INFO
        com.enterprise.business: INFO
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
---
