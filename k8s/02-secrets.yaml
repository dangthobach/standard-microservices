apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: product-mgmt-prod
type: Opaque
stringData:
  username: postgres
  password: CHANGE_ME_IN_PRODUCTION
  # Standardized: single database, schema-per-service.
  # Note: services now use DB_NAME + DB_SCHEMA env vars rather than these URLs.
  enterprise-db-url: jdbc:postgresql://postgres-service:5432/enterprise_db
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: product-mgmt-prod
type: Opaque
stringData:
  username: admin
  password: CHANGE_ME_IN_PRODUCTION
  host: rabbitmq-service
  port: "5672"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: product-mgmt-prod
type: Opaque
stringData:
  password: CHANGE_ME_IN_PRODUCTION
  host: redis-service
  port: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
